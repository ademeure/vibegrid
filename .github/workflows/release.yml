name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
      title:
        description: Release title
        required: true
      make_latest:
        description: Mark this release as latest
        required: true
        default: "true"
      draft:
        description: Create as draft release
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "APP_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Build macOS app
        run: CODESIGN_IDENTITY="-" APP_VERSION="${APP_VERSION}" ./scripts/build_app.sh

      - name: Package macOS app
        run: ditto -c -k --keepParent dist/VibeGrid.app dist/VibeGrid-macOS.zip

      - name: Upload macOS asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/VibeGrid-macOS.zip

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: windows/vibegrid-win11/go.mod
          cache-dependency-path: windows/vibegrid-win11/go.sum

      - name: Build Windows exe
        run: make windows-exe

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/windows/VibeGrid-Windows11.exe

  publish:
    runs-on: ubuntu-latest
    needs: [macos, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare asset paths
        run: |
          cp release-assets/release-macos/VibeGrid-macOS.zip .
          cp release-assets/release-windows/VibeGrid-Windows11.exe .

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Download

          | Platform | Asset |
          |----------|-------|
          | macOS | `VibeGrid-macOS.zip` |
          | Windows 11 | `VibeGrid-Windows11.exe` |

          ## macOS — Terminal install

          ```bash
          cd ~/Downloads
          unzip VibeGrid-macOS.zip
          sudo xattr -dr com.apple.quarantine VibeGrid.app
          mv VibeGrid.app /Applications/
          open /Applications/VibeGrid.app
          ```

          The `xattr` command clears the Gatekeeper quarantine flag so macOS won't block the unsigned app.

          ## macOS — System Settings install

          1. Unzip `VibeGrid-macOS.zip` and move `VibeGrid.app` to `Applications`.
          2. Double-click `VibeGrid.app` to open it.
          3. If macOS shows *"Apple could not verify..."*:
             - Open **System Settings > Privacy & Security**.
             - Scroll down and click **Open Anyway** next to the VibeGrid message.
             - Open the app again.

          ## Accessibility Permission

          VibeGrid needs Accessibility access to move and manage windows. macOS will prompt you on first launch, or enable it manually in **System Settings > Privacy & Security > Accessibility**.

          ## Windows 11

          Download and double-click `VibeGrid-Windows11.exe`. No extra files required.

          ---

          Full install and config instructions are in the [README](https://github.com/ademeure/vibegrid#readme).
          EOF
          sed -i 's/^          //' release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
          TITLE: ${{ inputs.title || github.ref_name }}
          MAKE_LATEST: ${{ inputs.make_latest || 'true' }}
          DRAFT: ${{ inputs.draft || 'false' }}
        run: |
          LATEST_FLAG=""
          if [ "$MAKE_LATEST" = "true" ]; then
            LATEST_FLAG="--latest"
          fi

          DRAFT_FLAG=""
          if [ "$DRAFT" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file release-notes.md \
            $LATEST_FLAG \
            $DRAFT_FLAG \
            VibeGrid-macOS.zip \
            VibeGrid-Windows11.exe
